version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - revive
    - staticcheck
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: package-comments
        - name: indent-error-flow
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unused-parameter
        - name: superfluous-else
        - name: unreachable-code
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - paramTypeCombine
    gosec:
      excludes:
        - G304
        - G404
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - prealloc
      - path: pii/context/data/
        linters:
          - misspell
